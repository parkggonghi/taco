<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>tacobell</title>
  </head>

  <body>
    <!-- 우측 상단 고정 네비게이션 -->
    <div class="nav-wrap" id="navWrap">
      <nav class="nav-menu" id="navMenu">
        <a href="index.html">Home</a>
        <a href="#">Menu</a>
        <a href="sns.html">SNS</a>
        <a href="#">Store</a>
      </nav>
      <button class="nav-icon" id="toggle">
        <img src="images/icon.png" alt="menu" />
      </button>
    </div>

    <div id="wrap">
      <!-- HEADER -->
      <div id="header">
        <img src="images/main_01.jpg" alt="" class="bg" />
        <div class="taco-wrap slide-down">
          <img src="images/taco1.png" alt="타코" class="taco-main" />
          <img src="images/taco2.png" alt="부시래기" class="taco-deco" />
        </div>
      </div>

      <div id="main">
        <img src="images/main_02.jpg" alt="" class="bg" />
      </div>
      <div id="taco"><img src="images/main_03.jpg" alt="" /></div>
      <div id="fan">
        <img src="images/main_04.jpg" alt="" class="fan-bg" />
        <div class="slider-container">
          <img src="images/fd1.png" alt="팬 1" class="slide-item" />
          <img src="images/fd2.png" alt="팬 2" class="slide-item" />
          <img src="images/fd3.png" alt="팬 3" class="slide-item" />
          <img src="images/fd4.png" alt="팬 4" class="slide-item" />
          <img src="images/fd7.png" alt="팬 5" class="slide-item" />
        </div>
      </div>
      <div id="search">
        <img src="images/main_05.jpg" alt="" class="bg" />
      </div>
      <div id="menu">
        <img src="images/main_06.jpg" alt="" />
        <div class="food-items">
          <img src="images/food1.png" alt="" class="food-img food-img--1" />
          <img src="images/food2.png" alt="" class="food-img food-img--2" />
          <img src="images/food3.png" alt="" class="food-img food-img--3" />
          <img src="images/food4.png" alt="" class="food-img food-img--4" />
          <img src="images/food5.png" alt="" class="food-img food-img--5" />
          <img src="images/food6.png" alt="" class="food-img food-img--6" />
        </div>
      </div>
      <div id="footer"><img src="images/main_07.jpg" alt="" /></div>
    </div>

    <script>
      // 네비게이션
      const toggle = document.getElementById("toggle");
      const navMenu = document.getElementById("navMenu");
      toggle.addEventListener("click", function () {
        navMenu.classList.toggle("open");
      });

      // 무한 슬라이더 (순환, 복제 없음)
      const items = Array.from(document.querySelectorAll("#fan .slide-item"));

      function getMetrics() {
        const vw = window.innerWidth / 100;
        return {
          itemW: 18 * vw,
          gap: 4 * vw,
          step: 22 * vw,
        };
      }

      let metrics = getMetrics();
      const positions = items.map(function (item, i) {
        const x = i * metrics.step;
        item.style.left = x + "px";
        return x;
      });

      // 창 크기 바뀌면 위치 재계산
      window.addEventListener("resize", function () {
        const prev = metrics;
        metrics = getMetrics();
        const ratio = metrics.step / prev.step;
        for (let i = 0; i < items.length; i++) {
          positions[i] = positions[i] * ratio;
          items[i].style.left = positions[i] + "px";
        }
      });

      const speed = 0.5;

      function animateSlider() {
        const maxPos = Math.max.apply(null, positions);
        for (let i = 0; i < items.length; i++) {
          positions[i] -= speed;
          if (positions[i] + metrics.itemW < 0) {
            positions[i] = maxPos + metrics.step - speed;
          }
          items[i].style.left = positions[i] + "px";
        }
        requestAnimationFrame(animateSlider);
      }
      animateSlider();
    </script>
  </body>
</html>
